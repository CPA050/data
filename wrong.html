<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的专属错题消灭模式</title>
    <!-- 引入主页的高级感样式表，让刷题卡片、滑动面板的外观和主页完全统一 -->
    <link rel="stylesheet" href="style.css" />
    <style>
        /* 融合你原本的暗黑科技风底色 */
        body {
            background: #0f0f1a !important;
            color: white !important;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- 错题库的主容器 -->
    <div id="app" class="stage-container">
        <div class="app-card" style="text-align:center; padding: 40px 20px; background:#1c1c2b; border-radius:12px;">
            <h2 style="color: #86868b; font-size: 16px;">📚 正在努力加载您的专属错题库...</h2>
        </div>
    </div>

    <!-- ⚠️ 严格按照顺序引入你的核心公共引擎 -->
    <script src="app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            // 1. 获取当前在主页登录的用户名
            const user = localStorage.getItem('quiz_user_id');
            if (!user) {
                alert("👤 请先在首页输入用户名/邮箱登录！");
                window.location.href = "/";
                return;
            }
            
            // 2. 🌟 核心开关：告知 app.js 引擎当前处于“错题消灭模式”，答对题目时自动触发删除
            window.isWrongQuestionMode = true; 

            try {
                // 3. 请求正确的后端接口，并带上当前用户的名字进行隔离查询
                const res = await fetch(`/api/wrong?user_id=${encodeURIComponent(user)}`);
                const wrongData = await res.json();
                
                // 4. 如果没题了，显示唯美的空空如也提示卡
                if (!wrongData || wrongData.length === 0) {
                    document.getElementById("app").innerHTML = `
                        <div class="app-card" style="text-align:center; padding: 40px 20px; background:#1c1c2b; border-radius:12px;">
                            <h2 style="margin:0; font-size: 18px; color: #4ade80;">🎉 恭喜！你的错题已全部消灭~</h2>
                            <p style="color:#86868b; margin-top:15px; font-size:14px; line-height:1.5;">
                                云端数据库很干净，没有关于你的错题记录。
                            </p>
                            <button onclick="window.location.href='/'" style="margin-top:20px; padding: 10px 20px; border-radius: 8px; border:none; background:#0071e3; color:white; cursor:pointer;">返回主页</button>
                        </div>
                    `;
                    return;
                }

                // 5. 将捞出来的云端错题注入全局变量，交给 QuizApp 引擎一键启动！
                window.QUESTION_BANK = wrongData; 
                
                // false 代表不乱序，按照你做错的先后顺序一道道消灭它
                QuizApp.start(false); 

            } catch (err) {
                console.error("加载错题异常:", err);
                document.getElementById("app").innerHTML = `
                    <div class="app-card" style="text-align:center; padding: 30px; background:#1c1c2b;">
                        ❌ 加载错题库失败，请检查网络或刷新重试
                    </div>
                `;
            }
        });
    </script>

</body>
</html>
