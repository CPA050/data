<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>答题系统</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* 仅保留必要的内联，其余全部在 style.css */
    </style>
</head>
<body>

    <!-- ===== 首页 ===== -->
    <div id="home">
        <!-- 状态栏 -->
        <div class="status-bar" id="userStatusBar">
            <span id="userInfoText" class="user-info" onclick="QuizApp.checkLogin()">👤 游客模式</span>
            <button onclick="QuizApp.logout()" id="logoutBtn" class="logout-btn">退出</button>
        </div>

        <!-- 主题切换 -->
        <div class="theme-bar">
            <button class="theme-btn theme-btn-light active" onclick="QuizApp.setTheme('light')" title="明亮"></button>
            <button class="theme-btn theme-btn-dark" onclick="QuizApp.setTheme('dark')" title="夜间"></button>
            <button class="theme-btn theme-btn-eye" onclick="QuizApp.setTheme('eye')" title="护眼"></button>
            <button class="theme-btn theme-btn-custom" onclick="QuizApp.openBgPicker()" title="自定义颜色"></button>
            <button class="theme-btn theme-btn-image" onclick="QuizApp.uploadBgImage()" title="自定义图片"></button>
        </div>

        <h1>📝 答题系统</h1>

        <!-- 主功能按钮（毛玻璃高级版） -->
        <button class="glass-btn primary" onclick="QuizApp.showQuantityModal(false)">
            <span class="btn-icon">▶</span> 顺序刷题
        </button>
        <button class="glass-btn primary" onclick="QuizApp.showQuantityModal(true)">
            <span class="btn-icon">🎲</span> 随机刷题
        </button>
        <button class="glass-btn secondary" onclick="QuizApp.showManager()">
            <span class="btn-icon">📚</span> 题库管理
        </button>

        <!-- 底部链接 -->
        <div class="footer-links">
            <a href="/wrong.html" class="glass-link" onclick="return QuizApp.checkLoginBeforeGo('/wrong.html')">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                我的错题库
            </a>
        </div>
    </div>

    <!-- ===== 应用容器（答题 & 管理） ===== -->
    <div id="app" style="display:none;"></div>

    <!-- ===== 毛玻璃数量选择弹窗 ===== -->
    <div id="quantityModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <span class="modal-title">📋 选择刷题数量</span>
                <button class="modal-close" onclick="QuizApp.closeQuantityModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-info">
                    你的题库共 <strong id="totalCount">0</strong> 道题
                </div>
                <div class="preset-grid">
                    <button class="preset-btn" onclick="QuizApp.selectQuantity(20)">20</button>
                    <button class="preset-btn" onclick="QuizApp.selectQuantity(50)">50</button>
                    <button class="preset-btn" onclick="QuizApp.selectQuantity(100)">100</button>
                    <button class="preset-btn" onclick="QuizApp.selectQuantity(-1)">📦 全部</button>
                </div>
                <div class="custom-row">
                    <span>自定义</span>
                    <input type="number" id="customQuantity" min="1" placeholder="输入数量" />
                    <button class="custom-confirm" onclick="QuizApp.confirmCustom()">确定</button>
                </div>
                <div class="modal-preview" id="modalPreview"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-start-btn" onclick="QuizApp.startWithQuantity()">▶ 开始刷题</button>
            </div>
        </div>
    </div>

    <!-- ===== 隐藏控件 ===== -->
    <input type="color" id="bgColorPicker" style="display:none;" onchange="QuizApp.applyCustomBg(this.value)" />
    <input type="file" id="bgImageInput" accept="image/*" style="display:none;" onchange="QuizApp.handleBgImageUpload(event)" />

    <script src="app.js"></script>
</body>
</html>
