<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>工程造价刷题系统</title>
<!-- 引入你刚刚改好的高级感样式表 -->
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 界面主容器 -->
<div id="home">
    <h1>工程造价 刷题系统</h1>
    <button onclick="QuizApp.start(false)">顺序刷题</button>
    <button onclick="QuizApp.start(true)">随机刷题</button>
</div>

<!-- 答题区域（默认隐藏，JS启动后显示） -->
<div id="app" style="display:none;">
    <div id="top">正确率: 0% | 进度: 0/0</div>
    <div id="viewport"></div>
    <div id="grid"></div>
</div>

<!-- ⚠️ 严格按照顺序引入外部独立文件 -->
<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
