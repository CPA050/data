<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>刷题系统</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- 首页 -->
<div id="home">
    <h1>刷题系统</h1>
    <button onclick="QuizApp.start(false)">顺序刷题</button>
    <button onclick="QuizApp.start(true)">随机刷题</button>
</div>

<!-- 答题区 -->
<div id="app" style="display:none;">
    <div id="top">正确率 0%</div>
    <div id="progress"></div>
    <div id="viewport"></div>
    <div id="grid"></div>
</div>

<script>
// 🌟 1. 直接把题库写在网页里，彻底解决引入失败问题
window.QUESTION_BANK = [
    {q:"从投资者角度看，某教学楼工程造价通常指该工程预计或实际支出的（ ）。",opts:["A. 施工企业利润","B. 全部固定资产投资费用","C. 材料采购费用","D. 人工工资"],a:1},
    {q:"下列造价文件中，通常由设计单位负责编制的是（ ）。",opts:["A. 施工预算","B. 投标报价","C. 设计概算","D. 竣工结算"],a:2},
    {q:"某宿舍楼有独立施工图纸，能够独立组织施工，但建成后不能独立发挥学校整体办学能力，该宿舍楼通常属于（ ）。",opts:["A. 单位工程","B. 单项工程","C. 分部工程","D. 分项工程"],a:0},
    {q:"工程量清单在招标阶段通常由（ ）提供。",opts:["A. 招标人","B. 投标人","C. 施工班组","D. 材料供应商"],a:0},
    {q:"投标报价高于招标控制价时，通常应（ ）。",opts:["A. 允许中标","B. 作为有效报价","C. 应予废标","D. 只扣技术分"],a:2},
    {q:"每一个工日的工作时间通常按（ ）计算。",opts:["A. 24小时","B. 12小时","C. 10小时","D. 8小时"],a:3},
    {q:"安全文明施工费在工程量清单计价中通常列入（ ）。",opts:["A. 分部分项工程费","B. 措施项目费","C. 暂列金额","D. 材料暂估价"],a:1},
    {q:"分部分项工程量清单项目编码通常采用（ ）编码。",opts:["A. 10位","B. 11位","C. 12位","D. 14位"],a:2},
    {q:"分部分项工程费通常按（ ）计算。",opts:["A. 工程量×综合单价","B. 建筑面积×税率","C. 材料数量×材料单价","D. 工程量×人工单价"],a:0},
    {q:"下列不属于综合单价通常组成内容的是（ ）。",opts:["A. 人工费","B. 企业管理费","C. 利润","D. 增值税"],a:3},
    {q:"有围护结构的建筑物，结构层高（ ）时通常计算全面面积。",opts:["A. ≥2.20m","B. ＞2.20m","C. ≥2.10m","D. ＞2.10m"],a:0},
    {q:"建筑面积是指房屋建筑外墙（ ）以上外围水平面测定的各层平面面积。",opts:["A. 散水","B. 勒脚","C. 窗台","D. 腰线"],a:1},
    {q:"某教学楼一层大厅净高6m，其建筑面积通常按（ ）计算。",opts:["A. 实际层","B. 自然层","C. 两层","D. 三层"],a:1},
    {q:"某土方开挖底宽2.8m，底长12m，该挖土形式通常属于（ ）。",opts:["A. 挖基坑土方","B. 挖沟槽土方","C. 平整场地","D. 屋面找平"],a:1},
    {q:"某土方开挖底宽3m，底长6m，该挖土形式通常属于（ ）。",opts:["A. 挖基坑土方","B. 挖沟槽土方","C. 平整场地","D. 垂直运输"],a:0},
    {q:"砖基础与砖墙使用同一种材料砌筑时，通常以（ ）为界。",opts:["A. 设计室内地坪","B. 设计室外地坪","C. 防潮层","D. 基础垫层顶面"],a:0},
    {q:"一砖半墙的计算厚度通常为（ ）。",opts:["A. 360mm","B. 365mm","C. 370mm","D. 375mm"],a:1},
    {q:"计算砖墙工程量时，内墙长度按（ ）计算。",opts:["A. 外墙外围线","B. 外墙中心线","C. 内墙中心线","D. 内墙净长线"],a:2},
    {q:"计算砖墙工程量时，不扣除单个面积≤（ ）的孔洞。",opts:["A. 0.2㎡","B. 0.3㎡","C. 0.4㎡","D. 0.5㎡"],a:1},
    {q:"现浇混凝土基础工程量按设计图示尺寸以（ ）计算。",opts:["A. 面积","B. 长度","C. 体积","D. 质量"],a:2},
    {q:"现浇混凝土过梁长度设计无规定时，按洞口宽度两端各增加（ ）mm计算。",opts:["A. 100","B. 250","C. 300","D. 500"],a:1},
    {q:"梁与柱相连时，梁长算至（ ）。",opts:["A. 柱侧面","B. 柱中心线","C. 轴线","D. 柱外100mm"],a:0},
    {q:"下列项目通常以 m² 计算工程量的是（ ）。",opts:["A. 现浇混凝土基础","B. 现浇混凝土梁","C. 现浇混凝土柱模板","D. 框架柱混凝土"],a:2},
    {q:"屋面防水层工程量一般按设计图示尺寸以（ ）计算。",opts:["A. 面积","B. 厚度","C. 长度","D. 体积"],a:0},
    {q:"土方开挖底宽3m、底长5m属于（ ）。",opts:["A. 挖基坑土方","B. 挖沟槽土方","C. 挖一般土方","D. 以上都不对"],a:0},
    {q:"某独立基础基坑开挖土方量为（4000×3600×2500mm），结果为（ ）。",opts:["A. 36m³","B. 3.6m³","C. 39.6m³","D. 32.4m³"],a:0},
    {q:"投资者角度的工程造价主要反映建设项目固定资产投资费用。",opts:["A. 正确","B. 错误"],a:0},
    {q:"工程量清单通常由投标人自行编制并提供给招标人。",opts:["A. 正确","B. 错误"],a:1},
    {q:"劳动定额有时间定额 and 产量定额两种表现形式。",opts:["A. 正确","B. 错误"],a:0},
    {q:"安全文明施工费可以任意降低。",opts:["A. 正确","B. 错误"],a:1},
    {q:"综合单价包括人工、材料、机械、管理费和利润。",opts:["A. 正确","B. 错误"],a:0},
    {q:"层高2.30m的房间计算全面面积。",opts:["A. 正确","B. 错误"],a:0},
    {q:"砖基础计算需扣除混凝土构件体积。",opts:["A. 正确","B. 错误"],a:0},
    {q:"砖垛应并入墙体体积。",opts:["A. 正确","B. 错误"],a:0},
    {q:"梁工程量扣除钢筋铁件。",opts:["A. 正确","B. 错误"],a:1},
    {q:"次梁算至主梁侧面。",opts:["A. 正确","B. 错误"],a:0},
    {q:"模板按混凝土体积计算。",opts:["A. 正确","B. 错误"],a:1},
    {q:"抹灰工程按面积计算。",opts:["A. 正确","B. 错误"],a:0},
    {q:"平整场地按首层面积计算。",opts:["A. 正确","B. 错误"],a:0}
];

// 🌟 2. 核心逻辑直接挂载
window.QuizApp = {
    idx: 0,
    record: [],
    activeBank: [],
    locked: false,

    start(isRandom) {
        if (!window.QUESTION_BANK || QUESTION_BANK.length === 0) {
            alert("题库未加载");
            return;
        }

        this.activeBank = [...QUESTION_BANK];

        if (isRandom) {
            this.activeBank.sort(() => Math.random() - 0.5);
        }

        this.idx = 0;
        this.record = new Array(this.activeBank.length).fill(null);

        const home = document.getElementById("home");
        const app = document.getElementById("app");

        if (!home || !app) {
            alert("HTML结构错误：缺少 home 或 app");
            return;
        }

        home.style.display = "none";
        app.style.display = "block";

        this.render();
        this.renderGrid();
        this.update();
    },

    render() {
        const q = this.activeBank[this.idx];
        const view = document.getElementById("viewport");

        if (!q || !view) return;

        view.innerHTML = `
            <h2>Q${this.idx + 1}. ${q.q}</h2>
            ${q.opts.map((o, i) => `
                <div class="opt" onclick="QuizApp.select(${i})">
                    ${o}
                </div>
            `).join("")}
        `;
    },

    async select(i) {
        if (this.locked) return;
        if (this.record[this.idx] !== null) return;

        this.locked = true;

        const q = this.activeBank[this.idx];
        this.record[this.idx] = i;

        const opts = document.querySelectorAll(".opt");

        if (i === q.a) {
            opts[i].classList.add("correct");
        } else {
            opts[i].classList.add("wrong");
            if (opts[q.a]) opts[q.a].classList.add("correct");

            // 错题写入数据库
            try {
                await fetch("/api/wrong-add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: q.q,
                        correct_answer: q.opts[q.a],
                        user_answer: q.opts[i]
                    })
                });
            } catch (e) {
                console.log("错题上传失败", e);
            }
        }

        this.update();
        this.renderGrid();

        setTimeout(() => {
            this.idx++;
            if (this.idx < this.activeBank.length) {
                this.render();
            } else {
                alert("已完成所有题目");
            }
            this.locked = false;
        }, 600);
    },

    update() {
        const done = this.record.filter(x => x !== null).length;
        const correct = this.record.filter((v, i) =>
            v !== null && v === this.activeBank[i].a
        ).length;

        const acc = done ? Math.round(correct / done * 100) : 0;
        const top = document.getElementById("top");
        if (top) top.innerText = "正确率 " + acc + "%";
    },

    renderGrid() {
        const grid = document.getElementById("grid");
        if (!grid) return;

        grid.innerHTML = "";

        this.activeBank.forEach((_, i) => {
            const d = document.createElement("div");
            d.innerText = i + 1;
            d.className = "qbtn";

            if (this.record[i] !== null) {
                d.style.background = this.record[i] === this.activeBank[i].a ? "#4caf50" : "#f44336";
                d.style.color = "#fff";
            }

            d.onclick = () => {
                this.idx = i;
                this.render();
            };

            grid.appendChild(d);
        });
    }
};

document.addEventListener("DOMContentLoaded", () => {
    console.log("系统加载成功，题库数:", window.QUESTION_BANK.length);
});
</script>

</body>
</html>
